<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ===== Favicon & App Icons ===== -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0d0d0f" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== Primary SEO ===== -->
    <title>
      Salmax Suppliers | Premium Clothing, Accessories & Boutique Supplies in
      Nairobi
    </title>
    <meta
      name="description"
      content="Salmax Suppliers is a Nairobi-based boutique supplier of premium clothing, accessories, and curated materials. Browse our catalogue and inquire directly on WhatsApp."
    />
    <meta
      name="keywords"
      content="Salmax Suppliers, boutique clothing Kenya, premium accessories Nairobi, wholesale clothing Kenya, fashion supplier Nairobi"
    />
    <meta name="author" content="Salmax Suppliers" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.salmaxsuppliers.com/" />

    <!-- ===== Open Graph (Facebook, WhatsApp, LinkedIn) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Salmax Suppliers" />
    <meta
      property="og:title"
      content="Salmax Suppliers | Premium Clothing, Accessories & Boutique Supplies"
    />
    <meta
      property="og:description"
      content="Curators of premium products and elegant supplies. Explore our boutique catalogue of clothing, accessories, and bespoke materials."
    />
    <meta
      property="og:image"
      content="https://www.salmaxsuppliers.com/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://www.salmaxsuppliers.com/" />
    <meta property="og:locale" content="en_KE" />

    <!-- ===== Twitter Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Salmax Suppliers | Premium Clothing, Accessories & Boutique Supplies"
    />
    <meta
      name="twitter:description"
      content="Curators of premium products and elegant supplies. Explore our boutique catalogue of clothing, accessories, and bespoke materials."
    />
    <meta
      name="twitter:image"
      content="https://www.salmaxsuppliers.com/og-image.png"
    />

    <!-- ===== Structured Data (JSON-LD) ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Salmax Suppliers",
        "image": "https://www.salmaxsuppliers.com/brand/salmax-icon-color.png",
        "url": "https://www.salmaxsuppliers.com/",
        "telephone": "+254719246761",
        "email": "info@salmaxsuppliers.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Nairobi",
          "addressCountry": "KE"
        },
        "sameAs": [
          "https://instagram.com",
          "https://facebook.com"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
